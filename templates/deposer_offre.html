<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Déposer une offre</title>
    <link rel="stylesheet" href="/assets/style.css">
    <link rel="stylesheet" href="/assets/style_connection.css">
</head>
<body>
    <main>
        <div class="Cadre">
            <div>
                <h2 class="Bloc">Déposer une offre</h2>

                <form action="traitement_offre.php" method="post">
                    <input
                        name="email_entreprise"
                        type="email"
                        placeholder="Email de l'entreprise"
                        required
                    >

                    <input
                        name="titre"
                        type="text"
                        placeholder="Titre de l'offre"
                        required
                    >

                    <select name="type_contrat" required>
                        <option value="" disabled selected>Type de contrat</option>
                        <option value="stage">Stage</option>
                        <option value="alternance">Alternance</option>
                        <option value="emploi">Emploi</option>
                    </select>

                    <input
                        name="secteur"
                        type="text"
                        placeholder="Secteur"
                        required
                    >

                    <input
                        name="localisation"
                        type="text"
                        placeholder="Localisation"
                        required
                    >

                    <textarea
                        name="description"
                        placeholder="Description de l'offre"
                        required
                    ></textarea>

                    <textarea
                        name="competences"
                        placeholder="Compétences recherchées"
                        required
                    ></textarea>

                    <input
                        name="remuneration"
                        type="text"
                        placeholder="Rémunération"
                    >

                    <input
                        name="date_debut"
                        type="date"
                    >

                    <button type="submit">Publier l'offre</button>
                </form>
            </div>
        </div>
    </main>
</body>
</html>

<body>

            <img class="image_head" src="assets/images/logo.png" alt="logo de S4A">
            <h1 class="Main_title">Stage 4 all</h1>
        </div>

        <nav class="Link_menu_classique">
            <a class="nav_link"><h1>Accueil</h1></a><span></span>
            <a class="nav_link"><h1>Offre</h1></a><span></span>
            <a class="nav_link"><h1>Conseil</h1></a><span></span>
            <a class="nav_link"><h1>Support</h1></a>
        </nav>

        <div class="Menu_burger">
            <label for="burger" class="Button_burger">
                <span></span>
                <span></span>
                <span></span>
            </label>
        </div>

        <a class="Compte image_head">
            <img class="image_connexion" src="assets/images/compte.png" alt="compte">
        </a>
    </header>

    <div class="contenu_page">
        <input type="checkbox" id="burger">

        <nav class="Link_menu_burger">
            <a class="nav_link"><p>Accueil</p></a>
            <a class="nav_link"><p>Offre</p></a>
            <a class="nav_link"><p>Conseil</p></a>
            <a class="nav_link"><p>Support</p></a>
        </nav>

        <aside></aside>

        <main>
            <div class="Cadre">
                <div>
                    <h2 class="Bloc">Créer un compte</h2>

                    <form action="traitement_inscription_user.php" method="post" enctype="multipart/form-data">
                        <input name="lastname" type="text" size="50" placeholder="Nom" required>
                        <input name="surname" type="text" size="50" placeholder="Prénom" required>

                        <select name="genre" required>
                            <option value="" disabled selected>Choisissez votre genre</option>
                            <option value="ms">Madame</option>
                            <option value="mr">Monsieur</option>
                            <option value="other">Autre</option>
                        </select>

                        <select name="role" required>
                            <option value="" disabled selected>Choisissez votre rôle</option>
                            <option value="etudiant">Étudiant</option>
                            <option value="professeur">Professeur</option>
                        </select>

                        <input name="email" type="email" size="50" autocomplete="on" placeholder="e-mail/login" required>
                        <input name="password" type="password" placeholder="Mot de passe" required>
                        <input name="password_confirm" type="password" placeholder="Confirmation" required>

                        <label for="cv">Dépose ton CV (PDF uniquement, 2 Mo max)</label>
                        <input id="cv" name="cv" type="file" accept=".pdf,application/pdf">

                        <button type="submit">Créer mon compte</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <footer>
        <h1>© Stage 4 All - 2026</h1>
        <a><h1>Mentions légales</h1></a>
        <div class="Follow">

            <a><img src="./assets/images/Insta.png" alt="Instagram"></a>

        </div>
